<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="50%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F8EF7" />
      <stop offset="100%" stop-color="#A78BFA" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Premium Squircle Background -->
  <path d="M128 48C61.7258 48 48 61.7258 48 128V384C48 450.274 61.7258 464 128 464H384C450.274 464 464 450.274 464 384V128C464 61.7258 450.274 48 384 48H128Z" fill="url(#bgGrad)" filter="url(#softGlow)"/>
  
  <!-- Dark inner panel for contrast -->
  <path d="M128 64C70.562 64 64 70.562 64 128V384C64 441.438 70.562 448 128 448H384C441.438 448 448 441.438 448 384V128C448 70.562 441.438 64 384 64H128Z" fill="#0F172A" fill-opacity="0.95"/>

  <!-- Academic Book Shape -->
  <path d="M256 368C256 368 200 336 128 344V184C200 176 256 208 256 208C256 208 312 176 384 184V344C312 336 256 368 256 368Z" fill="url(#bookGrad)" fill-opacity="0.15" stroke="url(#bookGrad)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Center Spine -->
  <path d="M256 208V368" stroke="url(#bookGrad)" stroke-width="20" stroke-linecap="round"/>

  <!-- Neural Connection / AI Nodes over the book -->
  <!-- Left Side Node -->
  <circle cx="180" cy="240" r="14" fill="#3B82F6"/>
  <!-- Right Side Node -->
  <circle cx="332" cy="270" r="14" fill="#8B5CF6"/>
  <!-- Top Center Node -->
  <circle cx="256" cy="140" r="16" fill="#6366F1" filter="url(#softGlow)"/>

  <!-- Connecting Lines -->
  <line x1="190" y1="230" x2="246" y2="150" stroke="#6366F1" stroke-width="6" stroke-linecap="round" stroke-dasharray="8 8"/>
  <line x1="322" y1="260" x2="266" y2="150" stroke="#8B5CF6" stroke-width="6" stroke-linecap="round" stroke-dasharray="8 8"/>
  <line x1="192" y1="246" x2="320" y2="266" stroke="#4F8EF7" stroke-width="4" stroke-linecap="round" stroke-dasharray="6 6"/>

</svg>
