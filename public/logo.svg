<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Definitions -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="50%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F8EF7" />
      <stop offset="100%" stop-color="#A78BFA" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Chat Bubble Squircle -->
  <path d="M128 48C61.7258 48 48 61.7258 48 128V384C48 450.274 61.7258 464 128 464H256L368 512V464H384C450.274 464 464 450.274 464 384V128C464 61.7258 450.274 48 384 48H128Z" fill="url(#bgGrad)" filter="url(#softGlow)"/>

  <!-- Inner Dark Glass Bubble for contrast -->
  <path d="M128 64C70.562 64 64 70.562 64 128V384C64 441.438 70.562 448 128 448H256L348 486V448H384C441.438 448 448 441.438 448 384V128C448 70.562 441.438 64 384 64H128Z" fill="#0F172A" fill-opacity="0.9" />

  <!-- The Open Book (Knowledge) -->
  <path d="M256 360C256 360 216 336 144 344V200C216 192 256 216 256 216C256 216 296 192 368 200V344C296 336 256 360 256 360Z" fill="url(#glowGrad)" fill-opacity="0.15" stroke="url(#glowGrad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Book Pages Lines -->
  <line x1="168" y1="240" x2="232" y2="252" stroke="white" stroke-opacity="0.6" stroke-width="12" stroke-linecap="round"/>
  <line x1="168" y1="280" x2="232" y2="292" stroke="white" stroke-opacity="0.6" stroke-width="12" stroke-linecap="round"/>
  <line x1="344" y1="240" x2="280" y2="252" stroke="white" stroke-opacity="0.6" stroke-width="12" stroke-linecap="round"/>
  <line x1="344" y1="280" x2="280" y2="292" stroke="white" stroke-opacity="0.6" stroke-width="12" stroke-linecap="round"/>

  <!-- Center Book Spine / Robot Core -->
  <path d="M256 216V360" stroke="url(#glowGrad)" stroke-width="16" stroke-linecap="round"/>
  <circle cx="256" cy="160" r="32" fill="#3B82F6" filter="url(#softGlow)"/>
  <circle cx="256" cy="160" r="16" fill="white"/>

  <!-- Robot Antenna / AI Nodes -->
  <circle cx="180" cy="120" r="12" fill="#8B5CF6"/>
  <line x1="228" y1="146" x2="188" y2="126" stroke="#8B5CF6" stroke-width="8" stroke-linecap="round"/>
  
  <circle cx="332" cy="120" r="12" fill="#6366F1"/>
  <line x1="284" y1="146" x2="324" y2="126" stroke="#6366F1" stroke-width="8" stroke-linecap="round"/>

</svg>
